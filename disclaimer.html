<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes AA</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Font Awsome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="img/favicon.png">
  <style>
    ::selection {
      background-color: rgb(80, 125, 42);
      color: white;
    }
    .bold { font-weight: bold; }
    .italics { font-style: italic; }
    .navbar {
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    .navbar-brand img {
      max-height: 60px;
    }
    .nav-button {
      margin-left: 10px;
    }
    .kid-mode {
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .kid-mode input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgb(252, 252, 255);
      z-index: 1000;
      padding-bottom: 20px;
    }
    .footer-container {
      max-width: 900px;
      margin: auto;
    }
    .footer-logo {
      width: 120px;
      margin-bottom: 15px;
    }
    .social-icons a {
      color: rgb(0, 123, 255);
      font-size: 22px;
      margin: 0 10px;
      transition: 0.3s;
    }
    .social-icons a:hover {
      color: rgb(0, 38, 255);
      transform: translateY(-2px);
    }
    .hosting {
      margin-top: 15px;
    }
    .render-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
    }
    .render-logo-fill {
      width: 18px;
      height: 18px;
      fill: rgb(120, 80, 255);
      transition: 0.3s;
    }
    .render-logo-fill:hover {
      transform: scale(1.1);
      fill: rgb(160, 120, 255);
    }
    .footer-bottom {
      margin-top: 20px;
      font-size: 13px;
    }
    .footer-bottom a {
      color: rgb(255, 165, 0);
      text-decoration: none;
      font-weight: 500;
    }
    .footer-bottom a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- ── Navbar ── -->
  <nav class="navbar navbar-expand-lg bg-body sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="img/logo.png" alt="Notes AA Logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="index.html#about">About NotesAA</a>
          </li>
          <li class="nav-item">
            <a href="new_notes.html">
              <button type="button" class="btn btn-danger">New Notes</button>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <!-- ── Disclaimer Section ── -->
  <section id="discliaimer" class="p-5">
    <h1>Disclaimer</h1>
    <p id="text1" class="kid-text"
      data-normal="The content provided on this website is for educational and informational purposes only. While we strive to ensure that all notes, resources, and materials are accurate and up to date, we make no guarantees regarding their completeness, reliability, or accuracy."
      data-kid="The content on this website is made to help you learn and understand things better. We try our best to keep everything correct and updated, but we can’t promise that everything is always complete or 100% accurate.">
    </p>
    <p id="text2" class="kid-text"
     data-normal="This website may contain user-submitted or third-party content. We do not claim ownership of such materials unless explicitly stated. If you are the rightful owner of any content and believe it has been used without proper authorization, please contact us, and we will take appropriate action."
     data-kid="This website may have content shared by other people. We don’t say that we own that content unless we clearly mention it. If something belongs to you and you think it was used without your permission, please contact us and we’ll fix it.">
    </p>
    <p id="text3" class="kid-text"
      data-normal="Users are advised to verify information independently before relying on it for academic or personal use. We are not responsible for any loss, damage, or consequences arising from the use of this website or its content."
      data-kid="You should always double-check the information before using it for school or personal work. We are not responsible for any problems or losses that happen from using this website or its content.">
    </p>
    <p>By using this website, you agree to this disclaimer and its terms.</p>
    
    <label class="kid-mode">
      <input type="checkbox" id="kidMode">
      Kid Mode
    </label>
    <script>
      const checkbox = document.getElementById("kidMode");
      const texts = document.querySelectorAll(".kid-text");
      
      function updateText() {
        texts.forEach(el => {
          el.innerHTML = checkbox.checked
          ? el.dataset.kid
          : el.dataset.normal;
        });
      }

      checkbox.addEventListener("change", updateText);
      updateText(); // run once on load
    </script>
  </section>
  <!-- ── Footer ── -->
  <footer class="footer">
    <div class="footer-container">
      <!-- Logo -->
      <img src="img/logo.png" class="footer-logo">
      <!-- Socials -->
      <div class="social-icons">
        <a href="https://www.linkedin.com/in/atharv-singh-1179823a9/" target="_blank" data-bs-toggle="tooltip" title="LinkedIn">
          <i class="bi bi-linkedin"></i>
        </a>
      </div>
      <!-- Hosting -->
      <div class="hosting">
        <span style="margin-right: 5px;">Backend hosted by:</span>
        <div class="render-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" class="render-logo-fill">
            <path d="M26.827.01c-4.596-.216-8.461 3.107-9.12 7.487-.027.203-.066.4-.099.596-1.025 5.454-5.797 9.584-11.53 9.584a11.67 11.67 0 0 1-5.634-1.442.298.298 0 0 0-.444.262v18.854h17.602V22.097c0-2.439 1.971-4.419 4.4-4.419h4.4c4.982 0 8.99-4.15 8.795-9.197C35.02 3.937 31.35.226 26.827.01Z"></path>
          </svg>
          <span>Render</span>
        </div>
      </div>
      <!-- Bottom -->
      <div class="footer-bottom text-center">
        © 2026 NotesAA |
        <a href="disclaimer.html">Disclaimer</a>
      </div>
    </div>
  </footer>
</body>
</html>
